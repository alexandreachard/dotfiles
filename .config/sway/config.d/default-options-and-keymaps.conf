#################################################
#                Configuration                  #
#################################################

set $mod Mod4
set $left left
#set $down j
#set $up k
set $right right

set $term alacritty

set $rofi_cmd rofi \
        -terminal '$term'

set $powermenu $HOME/.config/rofi/powermenu/powermenu.sh

# set $menu $rofi_cmd -show drun -replace
set $menu $HOME/.config/rofi/launchers/launcher.sh

### Idle configuration — manual lock only (Mod+Escape)
# No automatic lock, screen off, or suspend

set $gnome-schema org.gnome.desktop.interface

#bindsym $mod+f1 exec ~/.config/sway/scripts/lockman.sh

# Toggle between wallpapers
bindsym $mod+Shift+b exec ~/.config/sway/scripts/background-swap.sh

# Toggle background waybar
bindsym $mod+Shift+w exec ~/.config/waybar/scripts/swap.sh

### Key bindings
bindsym $mod+Return exec $term
bindsym $mod+q kill
bindsym $mod+d exec $menu
bindsym $mod+p exec $powermenu
bindsym $mod+Shift+p exec rofi -show window

# Clipboard manager
bindsym $mod+Shift+v exec "cliphist list | rofi -dmenu  | cliphist decode | wl-copy && wtype -M ctrl -M shift -k v -m ctrl -m shift"

# mouse button for dragging.
floating_modifier $mod normal

# Reload the configuration file
bindsym $mod+Shift+c reload

# Exit sway (logs you out of your Wayland session)
bindsym $mod+Shift+e exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -B 'Yes, exit sway' 'swaymsg exit'

# Moving around:
# Move your focus around
#bindsym $mod+Left focus left
bindsym $mod+Down focus output down
bindsym $mod+Up focus output up
#bindsym $mod+Right focus right
#bindsym $mod+Tab focus next
#bindsym $mod+Shift+Tab focus prev

# Move the focused window with the same, but add Shift
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right
#
# Workspaces:
# Fast directional cycling on the CURRENT monitor only
bindsym $mod+Right workspace next_on_output
bindsym $mod+Left workspace prev_on_output
#
# Quick toggle to jump between most recent workspaces
bindsym $mod+Tab workspace back_and_forth
#
# Switch to workspace
bindsym $mod+ampersand workspace number 1
bindsym $mod+eacute workspace number 2
bindsym $mod+quotedbl workspace number 3
bindsym $mod+apostrophe workspace number 4
bindsym $mod+parenleft workspace number 5
bindsym $mod+minus workspace number 6
bindsym $mod+egrave workspace number 7
bindsym $mod+underscore workspace number 8
bindsym $mod+ccedilla workspace number 9
bindsym $mod+agrave workspace number 10

# Move focused container to workspace
bindsym $mod+Shift+ampersand move container to workspace number 1
bindsym $mod+Shift+eacute move container to workspace number 2
bindsym $mod+Shift+quotedbl move container to workspace number 3
bindsym $mod+Shift+apostrophe move container to workspace number 4
bindsym $mod+Shift+parenleft move container to workspace number 5
bindsym $mod+Shift+minus move container to workspace number 6
bindsym $mod+Shift+egrave move container to workspace number 7
bindsym $mod+Shift+underscore move container to workspace number 8
bindsym $mod+Shift+ccedilla move container to workspace number 9
bindsym $mod+Shift+agrave move container to workspace number 10
# Note: workspaces can have any name you want, not just numbers.
# We just use 1-10 as the default.
#
# Layout stuff:
#
# You can "split" the current object of your focus with
# $mod+b or $mod+v, for horizontal and vertical splits
# respectively.
bindsym $mod+b splith
bindsym $mod+v splitv

# Switch the current container between different layout styles
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split

# Make the current focus fullscreen
bindsym $mod+f fullscreen

bindsym $mod+Shift+space floating toggle
bindsym $mod+space focus mode_toggle
bindsym $mod+a focus parent

# Resizing containers:
mode "resize" {
        bindsym Left resize shrink width 10px
        bindsym Down resize grow height 10px
        bindsym Up resize shrink height 10px
        bindsym Right resize grow width 10px

# Return to default mode
        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+r mode "default"
}
bindsym $mod+r mode "resize"

# App shortcuts
bindsym $mod+t exec thunar
bindsym $mod+Escape exec swaylock -c 000000

# Screenshot (region to clipboard)
bindsym $mod+Shift+s exec ~/.config/sway/scripts/screenshot.sh
