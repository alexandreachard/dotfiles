#################################################
#     Wayland environment variables             #
#################################################

# Core Wayland session variables
exec systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway

# Firefox Wayland support
exec systemctl --user set-environment MOZ_ENABLE_WAYLAND=1

# Qt applications Wayland support
exec systemctl --user set-environment QT_QPA_PLATFORM=wayland
exec systemctl --user set-environment QT_WAYLAND_DISABLE_WINDOWDECORATION=1

# GTK applications Wayland support
exec systemctl --user set-environment GDK_BACKEND=wayland

# Chromium/Edge Wayland optimization (CRITICAL for Teams/Edge PWA)
exec systemctl --user set-environment CHROMIUM_FLAGS="--enable-features=UseOzonePlatform,WaylandWindowDecorations,WebRTCPipeWireCapturer --ozone-platform=wayland --enable-wayland-ime --disable-gpu-driver-bug-workarounds"

# Intel GPU optimizations
exec systemctl --user set-environment LIBVA_DRIVER_NAME=iHD
exec systemctl --user set-environment VDPAU_DRIVER=va_gl

# Disable vsync in Chromium to prevent flickering with Intel
exec systemctl --user set-environment CHROMIUM_FLAGS="$CHROMIUM_FLAGS --disable-gpu-vsync"

# Java applications fix (prevents blank windows)
exec systemctl --user set-environment _JAVA_AWT_WM_NONREPARENTING=1

# SDL2 applications Wayland support
exec systemctl --user set-environment SDL_VIDEODRIVER=wayland
