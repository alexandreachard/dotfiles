#################################################
#                   FLOATING                    #
#################################################

# Floating for apps needing it
for_window [class="Yad" instance="yad"] floating enable
for_window [app_id="yad"] floating enable
for_window [app_id="blueman-manager"] floating enable, resize set width 40 ppt height 40 ppt
for_window [app_id="file-roller"] floating enable
for_window [class="Xsane" instance="xsane"] floating enable
for_window [app_id="pavucontrol"] floating enable, resize set width 30 ppt height 40 ppt
for_window [class="qt5ct" instance="qt5ct"] floating enable, resize set width 60 ppt height 50 ppt
for_window [class="Bluetooth-sendto" instance="bluetooth-sendto"] floating enable
for_window [class="Lxappearance"] floating enable, resize set width 60 ppt height 50 ppt

# Floating for window roles/types
for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_role="Preferences"] floating enable
for_window [window_role="About"] floating enable
for_window [window_type="dialog"] floating enable
for_window [window_type="menu"] floating enable
for_window [title="File Operation Progress"] floating enable, border pixel 1, sticky enable, resize set width 40 ppt height 30 ppt
for_window [title="nmtui"] floating enable, resize set width 50 ppt height 70 ppt
for_window [title="htop"] floating enable, resize set width 50 ppt height 70 ppt
for_window [app_id="xsensors"] floating enable
for_window [title="Save File"] floating enable
for_window [title="Picture in picture"] floating enable, sticky enable

#################################################
#              WORKSPACE ASSIGNMENTS            #
#################################################
# WS1: Teams
# WS2: Vivaldi Work
# WS3: Remmina RDP
# WS4: Firefox
# WS5: Vivaldi Perso

# WS1 — Microsoft Teams (Edge PWA, Wayland native)
for_window [app_id="msedge-teams.microsoft.com__-Default"] border none, inhibit_idle visible
assign [app_id="msedge-teams.microsoft.com__-Default"] workspace number 1

# WS2 — Vivaldi Work (launched with --class=vivaldi-work)
assign [class="vivaldi-work"] workspace number 2

# WS3 — Remmina RDP
assign [app_id="org.remmina.Remmina"] workspace number 3

# WS4 — Firefox
#assign [app_id="org.mozilla.firefox"] workspace number 4

# WS5 — Vivaldi Perso (launched with --class=vivaldi-perso)
assign [class="vivaldi-perso"] workspace number 5

# KeePassXC — floating, no workspace assignment
for_window [app_id="org.keepassxc.KeePassXC"] border pixel 2

# Inhibit idle for fullscreen video
for_window [app_id="code"] inhibit_idle fullscreen
for_window [app_id="org.mozilla.firefox"] inhibit_idle fullscreen

# Edge/Chromium anti-flickering — covers both generic Edge and Teams PWA
for_window [app_id="microsoft-edge"] opacity 1
for_window [app_id="msedge-teams.microsoft.com__-Default"] opacity 1

# Edge/Teams popups and tooltips — must float + no focus to prevent flickering
#for_window [app_id="microsoft-edge" title=""] floating enable, no_focus
#for_window [app_id="microsoft-edge" window_type="popup_menu"] floating enable, no_focus
#for_window [app_id="microsoft-edge" window_type="tooltip"] floating enable, no_focus
#for_window [app_id="microsoft-edge" window_type="notification"] floating enable, no_focus
#for_window [app_id="microsoft-edge" window_type="dropdown_menu"] floating enable, no_focus
#for_window [app_id="msedge-teams.microsoft.com__-Default" title=""] floating enable, no_focus
#for_window [app_id="^msedge-.*" floating] border none
# Obsidian & Web Clipper
for_window [class="obsidian"] focus_on_window_activation focus
