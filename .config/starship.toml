format = """
$directory$git_branch$git_status
$character"""

add_newline = false

[directory]
style = "bold cyan"
truncation_length = 8
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold purple"
format = " on [$symbol$branch]($style) "

[git_status]
format = "([\\[$all_status$ahead_behind\\]]($style))"
style = "bold white"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[character]
success_symbol = "[❯ ](bold white)"
error_symbol = "[❯ ](bold red)"
